name: "Issue triage"

on:
  # One-off manual run: push this branch to trigger a triage pass over the issues
  # listed in the matrices below. Not for merging.
  push:
    branches: [triage-manual-run]

# One triage at a time across the whole repo; let an in-flight run finish.
concurrency:
  group: triage
  cancel-in-progress: false

permissions: {}

jobs:
  triage:
    strategy:
      max-parallel: 1
      matrix:
        issue: [41564, 41563, 41562, 41550]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      copilot-requests: write
    env:
      ISSUE: ${{ matrix.issue }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Triage issue with Copilot CLI
        id: triage
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p output
          PROMPT=$(cat <<EOF
          Triage https://github.com/${{ github.repository }}/issues/$ISSUE using the playwright-triage skill.

          Do not post anything yourself. Write the comment to output/triage.md and a later step posts it.
          The link to this agent run is in \$WORKFLOW_URL.
          EOF
          )
          copilot \
            --allow-all-tools \
            --allow-all-paths \
            --no-ask-user \
            --model claude-opus-4.8 \
            --max-ai-credits 5 \
            -p "$PROMPT" \
            2>&1 | tee "output/copilot.log"

      - name: Add log to job summary
        if: always()
        run: |
          {
            echo "## Triage run log (issue $ISSUE)"
            echo ''
            echo '```'
            cat "output/copilot.log" 2>/dev/null || echo "(no log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-${{ matrix.issue }}
          path: output/**
          if-no-files-found: warn

  post:
    needs: triage
    strategy:
      max-parallel: 1
      matrix:
        issue: [41564, 41563, 41562, 41550]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      ISSUE: ${{ matrix.issue }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download triage output
        uses: actions/download-artifact@v4
        with:
          name: triage-${{ matrix.issue }}
          path: output

      - name: Post triage comment
        run: |
          if [ ! -s output/triage.md ]; then
            echo "No draft for issue $ISSUE; nothing to post."
            exit 0
          fi
          printf '\n\n<!-- playwright-ai-triage -->\n' >> output/triage.md
          gh issue comment "$ISSUE" --repo "${{ github.repository }}" --body-file output/triage.md
