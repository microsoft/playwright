name: extension

on:
  push:
    branches:
      - main
      - release-*
    paths:
      - 'packages/playwright-core/src/tools/**'
      - '!packages/playwright-core/src/tools/dashboard/**'
      - '!packages/playwright-core/src/tools/trace/**'
      - 'packages/extension/**'
      - 'tests/extension/**'
      - '.github/workflows/tests_extension.yml'
  pull_request:
    branches:
      - main
      - release-*
    paths:
      - 'packages/playwright-core/src/tools/**'
      - '!packages/playwright-core/src/tools/dashboard/**'
      - '!packages/playwright-core/src/tools/trace/**'
      - 'packages/extension/**'
      - 'tests/extension/**'
      - '.github/workflows/tests_extension.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  DEBUG: pw:mcp:error

jobs:
  test_extension:
    if: ${{ github.head_ref != 'webdriver-poc' }}  # TEMP: skip on webdriver-poc branch
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - run: npm ci
    - run: npm run build
    - run: npx playwright install --with-deps chromium
    - run: npm run test-extension
