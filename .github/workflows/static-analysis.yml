name: Static Analysis (Stage 4b)
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to analyze'
        required: true

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  eslint:
    name: eslint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Auto-fix
        run: npx eslint . --fix || true
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'style: auto-fix eslint findings'
          git push || true
      - run: npx eslint . || true
