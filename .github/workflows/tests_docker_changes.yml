name: tests docker (changes)

on:
  push:
    branches:
      - main
    paths:
      - 'utils/docker/**'
      - '.github/workflows/tests_docker*.yml'
  pull_request:
    branches:
      - main
      - release-*
    paths:
      - 'utils/docker/**'
      - '.github/workflows/tests_docker*.yml'

jobs:
  test_linux_docker:
    if: ${{ github.head_ref != 'webdriver-safari-poc' }}  # TEMP: skip on webdriver-safari-poc branch
    uses: ./.github/workflows/tests_docker.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit
