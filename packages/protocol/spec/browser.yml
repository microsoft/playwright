Browser:
  type: interface

  initializer:
    version: string
    name: string
    browserName:
      type: enum
      literals:
        - chromium
        - firefox
        - webkit

  commands:

    startServer:
      title: Start server
      parameters:
        title: string
        workspaceDir: string?
        metadata: json?
        host: string?
        port: int?
      returns:
        endpoint: string

    stopServer:
      title: Stop server

    close:
      title: Close browser
      parameters:
        reason: string?
      flags:
        pause: true

    killForTests:
      internal: true

    defaultUserAgentForTest:
      internal: true
      returns:
        userAgent: string

    newContext:
      title: Create context
      parameters:
        $mixin: ContextOptions
        proxy:
          type: object?
          properties:
            server: string
            bypass: string?
            username: string?
            password: string?
        storageState:
          type: object?
          properties:
            cookies:
              type: array?
              items: SetNetworkCookie
            origins:
              type: array?
              items: SetOriginStorage
      returns:
        context: BrowserContext

    newContextForReuse:
      internal: true
      parameters:
        $mixin: ContextOptions
        proxy:
          type: object?
          properties:
            server: string
            bypass: string?
            username: string?
            password: string?
        storageState:
          type: object?
          properties:
            cookies:
              type: array?
              items: SetNetworkCookie
            origins:
              type: array?
              items: SetOriginStorage
      returns:
        context: BrowserContext

    disconnectFromReusedContext:
      internal: true
      parameters:
        reason: string

    newBrowserCDPSession:
      title: Create CDP session
      group: configuration
      returns:
        session: CDPSession

    startTracing:
      title: Start browser tracing
      group: configuration
      parameters:
        page: Page?
        screenshots: boolean?
        categories:
          type: array?
          items: string

    stopTracing:
      title: Stop browser tracing
      group: configuration
      returns:
        artifact: Artifact

  events:

    context:
      parameters:
        context: BrowserContext

    close:
