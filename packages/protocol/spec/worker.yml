Worker:
  type: interface

  extends: EventTarget

  initializer:
    url: string

  commands:

    disconnect:
      title: Disconnect from worker
      parameters:
        reason: string?
      flags:
        pausesBeforeAction: true

    evaluateExpression:
      title: Evaluate
      parameters:
        expression: string
        isFunction: boolean?
        arg: SerializedArgument
      returns:
        value: SerializedValue

    evaluateExpressionHandle:
      title: Evaluate
      parameters:
        expression: string
        isFunction: boolean?
        arg: SerializedArgument
      returns:
        handle: JSHandle

    updateSubscription:
      internal: true
      parameters:
        event:
          type: enum
          literals:
          - console
        enabled: boolean

  events:

    console:
      parameters:
        $mixin: ConsoleMessage

    close:
