StackFrame:
  type: object
  properties:
    file: string
    line: int
    column: int
    function: string?

VirtualCredential:
  type: object
  properties:
    id: string
    rpId: string
    userHandle: string
    privateKey: string
    publicKey: string

Point:
  type: object
  properties:
    x: float
    y: float

Rect:
  type: object
  properties:
    x: float
    y: float
    width: float
    height: float

URLPattern:
  type: object
  properties:
    hash: string
    hostname: string
    password: string
    pathname: string
    port: string
    protocol: string
    search: string
    username: string

NameValue:
  type: object
  properties:
    name: string
    value: string
