Metadata:
  type: object
  properties:
    location:
      type: object?
      properties:
        file: string
        line: int?
        column: int?
    title: string?
    internal: boolean?
    # Test runner step id.
    stepId: string?

ClientSideCallMetadata:
  type: object
  properties:
    id: int
    stack:
      type: array?
      items: StackFrame

SDKLanguage:
  type: enum
  literals:
  - javascript
  - python
  - java
  - csharp

Disposable:
  type: interface

  commands:

    dispose:
      internal: true
      flags:
        potentiallyClosesScope: true

WaitInfo:
  type: object
  properties:
    waitId: string
    phase:
      type: enum
      literals:
      - before
      - after
      - log
    event: string?
    message: string?
    error: string?
