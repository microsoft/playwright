BrowserType:
  type: interface

  initializer:
    executablePath: string
    name: string

  commands:

    launch:
      title: Launch browser
      parameters:
        $mixin: LaunchOptions
        slowMo: float?
      returns:
        browser: Browser

    launchPersistentContext:
      title: Launch persistent context
      parameters:
        $mixin1: LaunchOptions
        $mixin2: ContextOptions
        userDataDir: string
        slowMo: float?
      returns:
        browser: Browser
        context: BrowserContext

    connectOverCDP:
      title: Connect over CDP
      parameters:
        endpointURL: string
        headers:
          type: array?
          items: NameValue
        slowMo: float?
        timeout: float
        isLocal: boolean?
        noDefaults: boolean?
      returns:
        browser: Browser
        defaultContext: BrowserContext?

    connectToWorker:
      title: Connect to worker
      parameters:
        endpoint: string
        timeout: float
      returns:
        worker: Worker
