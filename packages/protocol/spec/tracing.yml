Tracing:
  type: interface

  commands:

    tracingStart:
      title: Start tracing
      group: configuration
      parameters:
        name: string?
        snapshots: boolean?
        screenshots: boolean?
        live: boolean?

    tracingStartChunk:
      title: Start tracing
      group: configuration
      parameters:
        name: string?
        title: string?
      returns:
        traceName: string

    tracingGroup:
      title: Trace "{name}"
      parameters:
        name: string
        location:
          type: object?
          properties:
            file: string
            line: int?
            column: int?

    tracingGroupEnd:
      title: Group end

    tracingStopChunk:
      title: Stop tracing
      group: configuration
      parameters:
        mode:
          type: enum
          literals:
          - archive
          - discard
          - entries
      returns:
        # The artifact may be missing if the browser closes while tracing is being stopped.
        # Or it can be missing if client-side compression is taking place.
        artifact: Artifact?
        # For local mode, these are all entries.
        entries:
          type: array?
          items: NameValue

    tracingStop:
      title: Stop tracing
      group: configuration

    harStart:
      internal: true
      parameters:
        page: Page?
        options: RecordHarOptions
      returns:
        harId: string

    harExport:
      internal: true
      parameters:
        harId: string?
        mode:
          type: enum
          literals:
          - archive
          - entries
      returns:
        # Present when mode is 'archive'.
        artifact: Artifact?
        # Present when mode is 'entries'.
        entries:
          type: array?
          items: NameValue
