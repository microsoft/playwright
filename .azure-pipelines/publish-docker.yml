# Trigger: any `v*` release tag (e.g. v1.40.0).
# Can also be queued manually from the ADO UI.
trigger:
  tags:
    include:
      - v*
    exclude:
      - v*-*

pr: none

parameters:
- name: releaseChannel
  displayName: "IMPORTANT: set this to 'canary' when triggering manually"
  type: string
  default: stable
  values:
  - stable
  - canary

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: DevDivPlaywrightAzurePipelinesUbuntu2204
      os: linux
    sdl:
      sourceAnalysisPool:
        name: DevDivPlaywrightAzurePipelinesWindows2022
        # The image must be windows-based due to restrictions of the SDL tools. See: https://aka.ms/AAo6v8e
        os: windows
    stages:
    - stage: Publish
      jobs:
      # For canary builds the tag embeds a timestamp, so it must be only computed once.
      - job: Prepare
        displayName: "Compute version tag"
        steps:
        - checkout: self
          fetchDepth: 0
          displayName: "Checkout code"

        - task: UseNode@1
          inputs:
            version: '26.x'
          displayName: "Install Node.js"

        - task: Bash@3
          name: version
          displayName: "Compute version tag"
          inputs:
            targetType: "inline"
            script: |
              set -e
              VERSION_TAG=$(./utils/docker/publish_docker.sh ${{ parameters.releaseChannel }} version-tag)
              echo "Publishing Docker images under tag: ${VERSION_TAG}"
              echo "##vso[task.setvariable variable=tag;isOutput=true]${VERSION_TAG}"

      - job: PublishAmd64
        displayName: "Build & publish amd64 images"
        dependsOn: Prepare
        timeoutInMinutes: 120
        pool:
          name: DevDivPlaywrightAzurePipelinesUbuntu2204
          os: linux
        variables:
          PW_DOCKER_VERSION_TAG: $[ dependencies.Prepare.outputs['version.tag'] ]
        steps:
        - template: /.azure-pipelines/docker-build-arch.yml@self
          parameters:
            arch: amd64
            releaseChannel: ${{ parameters.releaseChannel }}

      - job: PublishArm64
        displayName: "Build & publish arm64 images"
        dependsOn: Prepare
        timeoutInMinutes: 120
        pool:
          name: DevDivPlaywrightAzurePipelinesUbuntu2204Arm
          os: linux
        variables:
          PW_DOCKER_VERSION_TAG: $[ dependencies.Prepare.outputs['version.tag'] ]
        steps:
        - template: /.azure-pipelines/docker-build-arch.yml@self
          parameters:
            arch: arm64
            releaseChannel: ${{ parameters.releaseChannel }}

      - job: PublishManifests
        displayName: "Publish multi-arch manifests"
        dependsOn:
        - Prepare
        - PublishAmd64
        - PublishArm64
        timeoutInMinutes: 60
        pool:
          name: DevDivPlaywrightAzurePipelinesUbuntu2204
          os: linux
        variables:
          PW_DOCKER_VERSION_TAG: $[ dependencies.Prepare.outputs['version.tag'] ]
        steps:
        - checkout: self
          fetchDepth: 0
          displayName: "Checkout code"

        - task: AzureCLI@2
          displayName: "Login to ACR via OIDC"
          inputs:
            azureSubscription: "Playwright-CDN"
            scriptType: "bash"
            scriptLocation: "inlineScript"
            inlineScript: "az acr login --name playwright"

        - task: Bash@3
          displayName: "Create & push multi-arch manifests"
          inputs:
            targetType: "inline"
            script: "./utils/docker/publish_docker.sh ${{ parameters.releaseChannel }} manifests"
